name: Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Exécution tests
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: 3306
      NODE_ENV: prod
      DATABASE_URL: mysql://root:${{ secrets.DB_PASSWORD }}@127.0.0.1:3306/${{ secrets.DB_NAME }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
            --health-cmd="mysqladmin ping -h localhost"
            --health-interval=5s
            --health-timeout=5s
            --health-retries=20

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6

      - name: Installation Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installation dépendances
        run: npm install

      - name: Config Prisma Client
        run: npx prisma generate

      - name: Exécution des migration
        run: npx prisma migrate deploy

      - name: Exécution tests
        run: npm test

    